<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>냥비서 — 채원님 미팅 예약</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #000000;
      --white:   #FFFFFF;
      --ltgray:  #EEEEEE;
      --gray:    #CCCCCC;
      --dkgray:  #888888;
      --desktop: #999999;
      --font:    'Press Start 2P', 'Monaco', monospace;
      --body:    'Monaco', 'Courier New', monospace;
    }

    /* ── Lang switch ─────────────────────────────── */
    .lang-switch {
      margin-left: auto;
      display: flex;
      gap: 2px;
      align-items: center;
    }
    .lang-btn {
      font-family: var(--font);
      font-size: 8px;
      color: var(--black);
      cursor: pointer;
      padding: 0 2px;
      user-select: none;
      opacity: 0.3;
    }
    .lang-btn.active {
      opacity: 1;
    }

    /* ── Ticker ──────────────────────────────────── */
    .ticker-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      height: 100%;
      margin-left: 8px;
    }
    .ticker-text {
      font-family: var(--font);
      font-size: 7px;
      color: var(--dkgray);
      white-space: nowrap;
      display: inline-block;
      animation: ticker 18s linear infinite;
    }
    @keyframes ticker {
      0%   { transform: translateX(120px); }
      100% { transform: translateX(-100%); }
    }

    /* ── Special dropdown ────────────────────────── */
    .special-dropdown {
      display: none;
      position: fixed;
      top: 20px;
      left: 0;
      z-index: 300;
      background: var(--white);
      border: 1px solid var(--black);
      box-shadow: 2px 2px 0 var(--black);
      min-width: 200px;
    }
    .special-dropdown.visible { display: block; }
    .special-track {
      font-family: var(--font);
      font-size: 7px;
      color: var(--black);
      padding: 7px 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .special-track:hover { background: var(--black); color: var(--white); }
    .special-track.playing::before { content: '♪ '; }

    /* ── Desktop ─────────────────────────────────── */
    body {
      background: var(--desktop);
      background-image:
        repeating-linear-gradient(45deg,
          rgba(0,0,0,.07) 0, rgba(0,0,0,.07) 1px,
          transparent 0, transparent 50%),
        repeating-linear-gradient(-45deg,
          rgba(0,0,0,.07) 0, rgba(0,0,0,.07) 1px,
          transparent 0, transparent 50%);
      background-size: 4px 4px;
      min-height: 100vh;
      padding: 0 0 40px;
      font-family: var(--body);
    }

    /* ── Mac menu bar ─────────────────────────────── */
    .mac-menubar {
      background: var(--white);
      border-bottom: 1px solid var(--black);
      height: 20px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 18px;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .mac-menu-item {
      font-family: var(--font);
      font-size: 8px;
      color: var(--black);
      cursor: default;
      padding: 0 2px;
      user-select: none;
    }
    .mac-menu-item.apple { font-size: 12px; }
    .mac-menu-item.active {
      background: var(--black);
      color: var(--white);
    }

    /* ── Window layout ────────────────────────────── */
    .desktop-area {
      display: flex;
      justify-content: center;
      padding: 20px 12px 0;
    }

    .mac-window {
      background: var(--white);
      border: 1px solid var(--black);
      box-shadow: 3px 3px 0 var(--black);
      width: 100%;
      max-width: 540px;
    }

    /* ── Title bar (stripe pattern) ───────────────── */
    .mac-titlebar {
      height: 22px;
      background: repeating-linear-gradient(
        to bottom,
        var(--black) 0, var(--black) 1px,
        var(--white) 1px, var(--white) 2px
      );
      border-bottom: 1px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
    }

    .mac-title-text {
      background: var(--white);
      padding: 0 10px;
      font-family: var(--font);
      font-size: 9px;
      color: var(--black);
      line-height: 1;
      white-space: nowrap;
    }

    .mac-close-box {
      position: absolute;
      left: 6px;
      width: 13px; height: 13px;
      border: 1px solid var(--black);
      background: var(--white);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px;
    }
    .mac-close-box:active { background: var(--black); }

    .mac-win-right {
      position: absolute;
      right: 6px;
      display: flex; gap: 4px;
    }
    .mac-zoom-box {
      width: 13px; height: 13px;
      border: 1px solid var(--black);
      background: var(--white);
    }

    /* ── Window body ──────────────────────────────── */
    .mac-win-body {
      padding: 14px 16px 16px;
      background: var(--white);
    }

    /* ── Progress ─────────────────────────────────── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--black);
    }
    .progress-dot {
      width: 10px; height: 10px;
      border: 1px solid var(--black);
      background: var(--white);
      flex-shrink: 0;
    }
    .progress-dot.done   { background: var(--black); }
    .progress-dot.active { background: var(--black); outline: 2px solid var(--black); outline-offset: 1px; }
    .progress-label {
      font-family: var(--font);
      font-size: 7px;
      color: var(--dkgray);
      margin-left: auto;
    }

    /* ── Cat section ──────────────────────────────── */
    .cat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      padding-bottom: 0;
    }

    .cat-sprite { flex-shrink: 0; }
    /* Mac-style dialog balloon */
    .cat-dialog {
      flex: 1;
      background: var(--white);
      border: 1px solid var(--black);
      padding: 10px 12px;
      position: relative;
    }
    .cat-name {
      font-family: var(--font);
      font-size: 7px;
      color: var(--dkgray);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cat-msg {
      font-family: var(--body);
      font-size: 14px;
      color: var(--black);
      line-height: 1.55;
    }

    /* ── Step dialog (inner window) ───────────────── */
    .step-dialog {
      border: 1px solid var(--black);
      background: var(--white);
      margin-bottom: 12px;
    }

    .step-titlebar {
      height: 18px;
      background: repeating-linear-gradient(
        to bottom,
        var(--black) 0, var(--black) 1px,
        var(--white) 1px, var(--white) 2px
      );
      border-bottom: 1px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .step-titlebar-text {
      background: var(--white);
      padding: 0 8px;
      font-family: var(--font);
      font-size: 7px;
      color: var(--black);
    }

    .step-body { padding: 16px; }

    .step-title {
      font-family: var(--font);
      font-size: 10px;
      color: var(--black);
      line-height: 1.8;
      margin-bottom: 18px;
    }

    /* ── Mac-style inputs ─────────────────────────── */
    .mac-field { margin-bottom: 14px; }
    .mac-label {
      display: block;
      font-family: var(--font);
      font-size: 7px;
      color: var(--black);
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    .mac-input {
      width: 100%;
      background: var(--white);
      border: 1px solid var(--black);
      /* Mac inset shadow */
      box-shadow: inset 1px 1px 0 var(--dkgray);
      padding: 7px 9px;
      font-family: var(--body);
      font-size: 15px;
      color: var(--black);
      outline: none;
    }
    .mac-input:focus {
      outline: 2px solid var(--black);
      outline-offset: 1px;
    }
    .mac-input.big {
      font-family: var(--font);
      font-size: 13px;
      padding: 10px 9px;
    }
    textarea.mac-input { min-height: 72px; resize: none; }
    .mac-hint {
      font-family: var(--body);
      font-size: 11px;
      color: var(--dkgray);
      margin-top: 3px;
    }

    /* ── Mac-style buttons ────────────────────────── */
    .btn-row { display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
    .btn-row.full .mac-btn { flex: 1; justify-content: center; }

    .mac-btn {
      background: var(--white);
      border: 2px solid var(--black);
      border-radius: 0;
      font-family: var(--font);
      font-size: 11px;
      color: var(--black);
      padding: 9px 20px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      user-select: none;
      box-shadow: 2px 2px 0 var(--black);
    }
    .mac-btn:active {
      background: var(--black);
      color: var(--white);
      box-shadow: none;
      transform: translate(2px, 2px);
    }
    .mac-btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

    /* Default button: filled black */
    .mac-btn.default {
      background: var(--black);
      color: var(--white);
      border: 2px solid var(--black);
      box-shadow: 2px 2px 0 var(--dkgray);
    }
    .mac-btn.default:active {
      background: var(--dkgray);
      box-shadow: none;
      transform: translate(2px, 2px);
    }
    .mac-btn.ghost {
      border-color: var(--dkgray);
      color: var(--dkgray);
      box-shadow: 2px 2px 0 var(--dkgray);
    }
    .mac-btn.ghost:active { background: var(--dkgray); color: var(--white); box-shadow: none; transform: translate(2px,2px); }

    /* ── Duration cards ───────────────────────────── */
    .dur-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }

    .dur-card {
      border: 1px solid var(--black);
      background: var(--white);
      padding: 24px 12px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .dur-card:active { background: var(--ltgray); }
    .dur-card.selected { background: var(--black); }
    .dur-card.selected .dur-label,
    .dur-card.selected .dur-desc { color: var(--white); }

    .dur-icon  { font-size: 22px; margin-bottom: 8px; }
    .dur-label { font-family: var(--font); font-size: 10px; color: var(--black); }
    .dur-desc  { font-size: 11px; color: var(--dkgray); margin-top: 4px; font-family: var(--body); }

    /* ── Calendar ─────────────────────────────────── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .cal-label {
      font-family: var(--font);
      font-size: 7px;
      color: var(--black);
    }
    .cal-nav-btns { display: flex; gap: 4px; }

    .cal-scroll {
      border: 1px solid var(--black);
      max-height: 320px;
      overflow-y: auto;
    }
    /* Mac-style scrollbar */
    .cal-scroll::-webkit-scrollbar { width: 15px; }
    .cal-scroll::-webkit-scrollbar-track { background: var(--ltgray); border-left: 1px solid var(--black); }
    .cal-scroll::-webkit-scrollbar-thumb { background: var(--gray); border: 1px solid var(--black); }

    .cal-grid {
      display: grid;
      grid-template-columns: 38px repeat(7, 1fr);
      background: var(--white);
    }

    .cal-th {
      background: var(--ltgray);
      border-right: 1px solid var(--black);
      border-bottom: 1px solid var(--black);
      padding: 5px 2px;
      text-align: center;
      font-family: var(--font);
      font-size: 6px;
      color: var(--black);
    }
    .cal-th.today {
      background: var(--black);
      color: var(--white);
    }

    .cal-tl {
      background: var(--ltgray);
      border-right: 1px solid var(--black);
      border-bottom: 1px solid var(--gray);
      font-family: var(--font);
      font-size: 6px;
      color: var(--dkgray);
      text-align: right;
      padding: 0 4px;
      position: relative;
      top: -6px;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding-bottom: 1px;
    }

    .cal-cell {
      border-right: 1px solid var(--gray);
      border-bottom: 1px solid var(--gray);
      background: var(--white);
      cursor: pointer;
      position: relative;
    }
    .cal-cell.h30 { height: 26px; }
    .cal-cell.h60 { height: 38px; }
    .cal-cell:hover:not(.busy):not(.out):not(.past) { background: var(--ltgray); }
    .cal-cell.busy { background: repeating-linear-gradient(45deg, var(--white) 0, var(--white) 2px, var(--ltgray) 2px, var(--ltgray) 4px); cursor: not-allowed; }
    .cal-cell.out  { background: var(--ltgray); cursor: default; }
    .cal-cell.past { opacity: 0.3; cursor: default; }
    .cal-cell.selected {
      background: var(--black) !important;
    }

    .busy-mark {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--black);
    }

    /* ── Selected slot indicator ──────────────────── */
    .slot-badge {
      display: none;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--black);
      padding: 7px 10px;
      margin-top: 10px;
      font-family: var(--body);
      font-size: 13px;
      background: var(--ltgray);
    }
    .slot-badge.visible { display: flex; }

    /* ── Summary box ──────────────────────────────── */
    .mac-summary {
      border: 1px solid var(--black);
      background: var(--ltgray);
      margin-bottom: 16px;
    }
    .mac-sum-row {
      display: flex;
      gap: 10px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--gray);
      font-family: var(--body);
      font-size: 13px;
    }
    .mac-sum-row:last-child { border-bottom: none; }
    .mac-sum-k {
      font-family: var(--font);
      font-size: 8px;
      color: var(--dkgray);
      width: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      text-transform: uppercase;
    }
    .mac-sum-v { color: var(--black); font-weight: bold; }

    /* ── Success ──────────────────────────────────── */
    .mac-success-title {
      font-family: var(--font);
      font-size: 11px;
      color: var(--black);
      text-align: center;
      margin-bottom: 12px;
      line-height: 1.8;
    }

    /* ── Pixel spinner ────────────────────────────── */
    .mac-spinner {
      display: flex;
      gap: 5px;
      justify-content: center;
      padding: 24px;
    }
    .mac-spin-dot {
      width: 8px; height: 8px;
      background: var(--black);
      border: 1px solid var(--black);
    }
    .mac-spin-dot:nth-child(1) { animation: bk .9s 0s   infinite steps(2); }
    .mac-spin-dot:nth-child(2) { animation: bk .9s .2s  infinite steps(2); }
    .mac-spin-dot:nth-child(3) { animation: bk .9s .4s  infinite steps(2); }
    @keyframes bk { 50% { background: var(--white); } }

    /* ── Toast ────────────────────────────────────── */
    .toast-wrap {
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: flex; flex-direction: column; gap: 6px; align-items: center;
    }
    .toast {
      background: var(--white);
      border: 1px solid var(--black);
      box-shadow: 2px 2px 0 var(--black);
      font-family: var(--font);
      font-size: 8px;
      padding: 8px 16px;
      color: var(--black);
      white-space: nowrap;
      animation: tin .1s steps(2);
    }
    .toast.error { background: var(--black); color: var(--white); }
    @keyframes tin { from { opacity: 0; } to { opacity: 1; } }

    /* ── Step transition ──────────────────────────── */
    .step { animation: sin .1s steps(3); }
    @keyframes sin { from { opacity: 0; } to { opacity: 1; } }

    /* ── Mac divider ──────────────────────────────── */
    .mac-hr { border: none; border-top: 1px solid var(--black); margin: 8px 0; }

    /* ── SVG Cat ─────────────────────────────────── */
    .cat-sprite { flex-shrink: 0; width: 120px; height: 120px; position: relative; }
    .cat-svg { display: block; }

    /* ── Sparkle stars ───────────────────────────── */
    .cat-stars { display: none; }

    .star { position: absolute; }

    @keyframes starPop {
      0%   { opacity: 0; transform: scale(0) rotate(0deg); }
      30%  { opacity: 1; transform: scale(1) rotate(0deg); }
      60%  { opacity: 1; transform: scale(1) rotate(45deg); }
      80%  { opacity: 0; transform: scale(0.4) rotate(45deg); }
      100% { opacity: 0; transform: scale(0) rotate(45deg); }
    }
    .star:nth-child(1) { top: -8px;  right: 4px;  animation: starPop 1.4s steps(3) 0s   infinite; }
    .star:nth-child(2) { top: 10px;  left: -6px;  animation: starPop 1.4s steps(3) 0.4s infinite; }
    .star:nth-child(3) { bottom: 8px; right: -4px; animation: starPop 1.4s steps(3) 0.8s infinite; }
    .star:nth-child(4) { top: 40%;  right: -10px; animation: starPop 1.4s steps(3) 0.2s infinite; }
    .star:nth-child(5) { bottom: 20%; left: -8px; animation: starPop 1.4s steps(3) 1.0s infinite; }

    @keyframes catBlink {
      0%, 88%, 100% { opacity: 0; }
      90%, 97% { opacity: 1; }
    }
    .eye-blink  { animation: catBlink 3.8s 0.5s infinite; }
    .eye-blink2 { animation: catBlink 3.8s 0.7s infinite; }

    #catSvgHappy { display: none; }
    .cat-sprite.happy #catSvg      { display: none; }
    .cat-sprite.happy #catSvgHappy { display: block; }

    /* ── Status bar ───────────────────────────────── */
    .mac-statusbar {
      border-top: 1px solid var(--black);
      background: var(--ltgray);
      padding: 4px 8px;
      font-family: var(--font);
      font-size: 7px;
      color: var(--dkgray);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

<!-- Mac menu bar -->
<div class="mac-menubar">
  <span class="mac-menu-item apple">&#63743;</span>
  <span class="mac-menu-item">File</span>
  <span class="mac-menu-item">Edit</span>
  <span class="mac-menu-item" id="menuSpecial" onclick="toggleSpecialMenu()">Special</span>
  <span class="mac-menu-item" id="playBtn" onclick="togglePlay()" style="cursor:pointer;font-size:10px">▶</span>
  <div class="lang-switch">
    <span id="btnKR" class="lang-btn active" onclick="switchLang('ko')">KR</span>
    <span id="btnEN" class="lang-btn" onclick="switchLang('en')">EN</span>
  </div>
</div>

<!-- Special dropdown -->
<div class="special-dropdown" id="specialDropdown">
  <div class="special-track" id="track0" onclick="switchTrack(0)">CJAMM — POKERFACE</div>
  <div class="special-track" id="track1" onclick="switchTrack(1)">NewJeans — Hype Boy 250 Remix</div>
</div>

<audio id="bgAudio" preload="auto"></audio>

<div class="desktop-area">
  <div class="mac-window">


    <div class="mac-win-body">

      <!-- Progress -->
      <div class="progress-row" id="progressRow">
        <div class="progress-dot" id="pd1"></div>
        <div class="progress-dot" id="pd2"></div>
        <div class="progress-dot" id="pd3"></div>
        <div class="progress-dot" id="pd4"></div>
        <span class="progress-label" id="progressLabel">STEP 1 / 4</span>
      </div>

      <!-- Cat + bubble -->
      <div class="cat-row">
        <div class="cat-sprite" id="catWrap">
          <div class="cat-stars">
            <svg class="star" width="14" height="14" viewBox="-10 -10 20 20"><path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2Z" fill="#000"/></svg>
            <svg class="star" width="10" height="10" viewBox="-10 -10 20 20"><path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2Z" fill="#000"/></svg>
            <svg class="star" width="12" height="12" viewBox="-10 -10 20 20"><path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2Z" fill="#000"/></svg>
            <svg class="star" width="8"  height="8"  viewBox="-10 -10 20 20"><path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2Z" fill="#000"/></svg>
            <svg class="star" width="11" height="11" viewBox="-10 -10 20 20"><path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2Z" fill="#000"/></svg>

function t(key, ...args) {
  const v = I18N[lang][key];
  return typeof v === 'function' ? v(...args) : v;
}
function switchLang(l) {
  lang = l;
  document.getElementById('btnKR').classList.toggle('active', l === 'ko');
  document.getElementById('btnEN').classList.toggle('active', l === 'en');
  renderStep();
  const catKey = S.step === 5 ? 5 : S.step;
  setCat(catKey);
}

function drawCat(mode = 'normal') {
  const wrap = document.getElementById('catWrap');
  if (wrap) wrap.classList.toggle('happy', mode === 'happy');
}

// ─── State ────────────────────────────────────────────────────────────────────
let S = { step:1, name:'', dur:60, weekOff:0, busy:[], selections:[] };

const CAT_MSGS = {
  1:   { mode:'normal', msg:() => t('cat1') },
  2:   { mode:'normal', msg:() => t('cat2', S.name) },
  '3a':{ mode:'think',  msg:() => t('cat3a') },
  3:   { mode:'normal', msg:() => t('cat3') },
  4:   { mode:'normal', msg:() => t('cat4') },
  5:   { mode:'happy',  msg:() => t('cat5') },
};

function setCat(key) {
  const c = CAT_MSGS[key];
  drawCat(c.mode);
  document.getElementById('catMsg').innerHTML = c.msg();
}

function setStatus(left, right) {}

function updateProgress() {
  [1,2,3,4].forEach(n => {
    const el = document.getElementById('pd'+n);
    el.className = 'progress-dot' + (n < S.step ? ' done' : n === S.step ? ' active' : '');
  });
  document.getElementById('progressLabel').textContent =
    S.step <= 4 ? `STEP ${S.step} / 4` : 'DONE';
}

// ─── Steps ────────────────────────────────────────────────────────────────────
function renderStep() {
  updateProgress();
  const el = document.createElement('div'); el.className = 'step';
  switch (S.step) {
    case 1: el.innerHTML = step1HTML(); setStatus('이름 입력 중', 'STEP 1'); break;
    case 2: el.innerHTML = step2HTML(); setStatus('시간 선택 중', 'STEP 2'); break;
    case 3: el.innerHTML = step3HTML(); setCat('3a'); loadBusy(); setStatus('캘린더 로딩 중...', 'STEP 3'); break;
    case 4: el.innerHTML = step4HTML(); setStatus('정보 입력 중', 'STEP 4'); break;
  }
  const c = document.getElementById('stepContainer');
  c.innerHTML = ''; c.appendChild(el);
  if (S.step !== 3) setCat(S.step);
  if (S.step === 1) setTimeout(() => document.getElementById('nameIn')?.focus(), 60);
}

// ── Step 1 ─────────────────────────────────────────────────────────────────
function step1HTML() {
  return `
    <div class="step-dialog">
      <div class="step-body">
        <div class="mac-field">
          <label class="mac-label">${t('nameLabel')}</label>
          <input class="mac-input big" id="nameIn" type="text"
            value="${esc(S.name)}" placeholder="${t('namePlaceholder')}"
            onkeydown="if(event.key==='Enter')next1()" />
        </div>
        <div class="btn-row full">
          <button class="mac-btn default" onclick="next1()">${t('nextBtn')}</button>
        </div>
      </div>
    </div>`;
}
function next1() {
  const v = document.getElementById('nameIn')?.value.trim();
  if (!v) { toast(t('nameRequired'), true); return; }
  S.name = v; S.step = 2; renderStep();
}

    <div class="step-dialog">

        <div class="dur-grid">

            <div class="dur-desc">${t('dur30desc')}</div>
          </div>

function setDur(min, el) {
  S.dur = min;

// ── Step 3 ─────────────────────────────────────────────────────────────────
function step3HTML() {
  return `
    <div class="step-dialog">
      <div class="step-body" style="padding-bottom:12px">
        <div class="cal-nav">
          <span class="cal-label" id="calLabel">${t('loading')}</span>
          <div class="cal-nav-btns">
            <button class="mac-btn" style="padding:4px 8px;font-size:7px" onclick="wk(-1)">◀</button>
            <button class="mac-btn" style="padding:4px 8px;font-size:7px" onclick="wk0()">TODAY</button>
            <button class="mac-btn" style="padding:4px 8px;font-size:7px" onclick="wk(1)">▶</button>
          </div>
        </div>
        <div class="cal-scroll">
          <div id="calGrid">
            <div class="mac-spinner">
              <div class="mac-spin-dot"></div>
              <div class="mac-spin-dot"></div>
              <div class="mac-spin-dot"></div>
            </div>
          </div>

        </div>

          <button class="mac-btn default" id="toStep4" disabled onclick="next3()">${t('nextSlot')}</button>
        </div>
      </div>
    </div>`;

async function loadBusy() {
  try {
    const r = await fetch('/api/availability?days=21');
    const { busy } = await r.json();
    S.busy = busy.map(b => ({ s: new Date(b.start), e: new Date(b.end) }));
    setCat(3);
    setStatus('캘린더 로드 완료', 'STEP 3');
  } catch { setCat(3); }
  drawCal();
}

function drawCal() {
  const grid = document.getElementById('calGrid');
  const lbl  = document.getElementById('calLabel');
  if (!grid) return;

  const today = new Date(); today.setHours(0,0,0,0);
  const ws = new Date(today);
  ws.setDate(today.getDate() - today.getDay() + 1 + S.weekOff * 7);
  const days = Array.from({length:7}, (_,i) => { const d=new Date(ws); d.setDate(ws.getDate()+i); return d; });

  if (lbl) lbl.textContent = `${days[0].getMonth()+1}/${days[0].getDate()} — ${days[6].getMonth()+1}/${days[6].getDate()}`;

  const hCell = S.dur===30 ? 'h30' : 'h60';
  const slots = [];
  for (let h=WORK_START; h<WORK_END; h++) { slots.push({h,m:0}); if(S.dur===30) slots.push({h,m:30}); }

  let html = `<div class="cal-grid">`;
  html += `<div class="cal-th"></div>`;
  days.forEach((d,i) => {
    const isTd = d.getTime()===today.getTime();
    html += `<div class="cal-th ${isTd?'today':''}">${t('days')[i]}<br>${d.getDate()}</div>`;
  });

  slots.forEach(({h,m}) => {
    html += `<div class="cal-tl">${m===0?`${h}:00`:''}</div>`;
    days.forEach(day => {
      const ss=new Date(day); ss.setHours(h,m,0,0);
      const se=new Date(ss); se.setMinutes(se.getMinutes()+S.dur);
      const past=se<=new Date();
      const busy=S.busy.some(b=>b.s<se&&b.e>ss);
      const sel=S.selections.some(s=>s.si===ss.toISOString());
      let cls=`cal-cell ${hCell}`;
      if(past)cls+=' past'; else if(busy)cls+=' busy';
      if(sel)cls+=' selected';
      const mark=busy?'<div class="busy-mark"></div>':'';
      const click=(!past&&!busy)?`onclick="pickSlot('${ss.toISOString()}','${se.toISOString()}')"` :'';
      html+=`<div class="${cls}" ${click}>${mark}</div>`;
    });
  });

  html+=`</div>`;
  grid.innerHTML=html;
}

function pickSlot(si,ei) {
  const idx=S.selections.findIndex(s=>s.si===si);
  if(idx>=0) { S.selections.splice(idx,1); }
  else if(S.selections.length>=3) { toast(t('maxSlots')); return; }
  else { S.selections.push({si,ei}); }
  drawCal();
  const badge=document.getElementById('slotBadge');
  const txt=document.getElementById('slotTxt');
  if(badge&&txt) {
    if(S.selections.length===0) { badge.classList.remove('visible'); }
    else { txt.textContent=t('selectedCount', S.selections.length); badge.classList.add('visible'); }
  }
  const btn=document.getElementById('toStep4');
  if(btn) btn.disabled=S.selections.length===0;
}

function wk(d){S.weekOff+=d;drawCal();}
function wk0(){S.weekOff=0;drawCal();}
function next3(){if(!S.selections.length)return;S.step=4;renderStep();}

// ── Step 4 ─────────────────────────────────────────────────────────────────
function step4HTML() {
  const loc=t('locale');
  const fd=d=>d.toLocaleDateString(loc,{month:'long',day:'numeric',weekday:'short'});
  const ft=d=>d.toLocaleTimeString(loc,{hour:'2-digit',minute:'2-digit'});
  const slotRows=S.selections.map((s,i)=>{
    const st=new Date(s.si),en=new Date(s.ei);
    return `<div class="mac-sum-row"><span class="mac-sum-k">${t('labelCandidate',i)}</span><span class="mac-sum-v">${fd(st)} ${ft(st)} — ${ft(en)}</span></div>`;
  }).join('');
  return `
    <div class="step-dialog">
      <div class="step-body">
        <div class="mac-summary">
          <div class="mac-sum-row"><span class="mac-sum-k">${t('labelName')}</span><span class="mac-sum-v">${esc(S.name)}</span></div>
          ${slotRows}
          <div class="mac-sum-row"><span class="mac-sum-k">${t('labelLength')}</span><span class="mac-sum-v">${S.dur}${t('labelMin')}</span></div>
        </div>
        <div class="mac-field">
          <label class="mac-label">${t('emailLabel')}</label>
          <input class="mac-input" id="reqEmail" type="email" placeholder="you@example.com" />
          <div class="mac-hint">${t('emailHint')}</div>
        </div>
        <div class="mac-field">
          <label class="mac-label">${t('titleLabel')}</label>
          <input class="mac-input" id="reqTitle" type="text" placeholder="${t('titlePlaceholder')}" />
        </div>
        <div class="mac-field">
          <label class="mac-label">${t('purposeLabel')}</label>
          <textarea class="mac-input" id="reqPurpose" placeholder="${t('purposePlaceholder')}"></textarea>
        </div>
        <div class="btn-row">
          <button class="mac-btn ghost" onclick="back()">${t('backBtn')}</button>
          <button class="mac-btn default" id="submitBtn" onclick="send()">${t('submitBtn')}</button>
        </div>
      </div>
    </div>`;
}

async function send() {
  const email=document.getElementById('reqEmail')?.value.trim();
  const title=document.getElementById('reqTitle')?.value.trim();
  const purpose=document.getElementById('reqPurpose')?.value.trim();
  if(!email){toast(t('emailRequired'),true);return;}
  if(!title){toast(t('titleRequired'),true);return;}
  const btn=document.getElementById('submitBtn');
  btn.textContent=t('sending');btn.disabled=true;
  setStatus('...','');
  try {
    const res=await fetch('/api/request',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({requesterName:S.name,requesterEmail:email,title,purpose,
        requestedStart:S.selections[0].si,requestedEnd:S.selections[0].ei,
        candidates:S.selections.map(s=>({start:s.si,end:s.ei}))})});
    const d=await res.json();
    if(d.success) renderSuccess();
    else{toast(d.error||t('networkError'),true);btn.textContent=t('submitBtn');btn.disabled=false;}
  } catch{toast(t('networkError'),true);btn.textContent=t('submitBtn');btn.disabled=false;}
}

// ── Success ─────────────────────────────────────────────────────────────────
function renderSuccess() {
  setCat(5);
  setStatus('전송 완료!', '냥비서 v1.0');
  document.getElementById('progressLabel').textContent='DONE';
  [1,2,3,4].forEach(n=>document.getElementById('pd'+n).className='progress-dot done');
  const loc=t('locale');
  const fd=d=>d.toLocaleDateString(loc,{month:'long',day:'numeric',weekday:'short'});
  const ft=d=>d.toLocaleTimeString(loc,{hour:'2-digit',minute:'2-digit'});
  const slotRows=S.selections.map((s,i)=>{
    const st=new Date(s.si),en=new Date(s.ei);
    return `<div class="mac-sum-row"><span class="mac-sum-k">${t('labelCandidate',i)}</span><span class="mac-sum-v">${fd(st)} ${ft(st)} — ${ft(en)}</span></div>`;
  }).join('');
  document.getElementById('stepContainer').innerHTML=`
    <div class="step">
      <div class="step-dialog">
        <div class="step-body">
          <div class="mac-summary">
            <div class="mac-sum-row"><span class="mac-sum-k">${t('labelName')}</span><span class="mac-sum-v">${esc(S.name)}</span></div>
            ${slotRows}
            <div class="mac-sum-row"><span class="mac-sum-k">${t('labelLength')}</span><span class="mac-sum-v">${S.dur}${t('labelMin')}</span></div>
          </div>
          <div class="btn-row full">
            <button class="mac-btn" onclick="restart()">${t('restartBtn')}</button>
          </div>
        </div>
      </div>
    </div>`;
}

function restart() {
  S={step:1,name:'',dur:60,weekOff:0,busy:[],selections:[]};
  renderStep();
}

function back(){if(S.step>1){S.step--;renderStep();}}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toast(msg,err=false){
  const el=document.createElement('div');
  el.className='toast'+(err?' error':'');
  el.textContent=msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// ─── Music player ─────────────────────────────────────────────────────────────
const PLAYLIST = [
  { artist: 'CJAMM', title: 'POKERFACE', src: '/audio/track2.mp3' },
  { artist: 'NewJeans', title: 'Hype Boy 250 Remix', src: '/audio/track1.mp3' },
];
let currentTrack = 0;
let isPlaying = false;
const audio = document.getElementById('bgAudio');

function loadTrack(idx) {
  audio.src = PLAYLIST[idx].src;
  document.querySelectorAll('.special-track').forEach((el, i) => {
    el.classList.toggle('playing', i === idx);
  });
  const ticker = document.getElementById('tickerText');
  if (ticker) ticker.textContent = `${PLAYLIST[idx].artist} — ${PLAYLIST[idx].title}`;
}

function togglePlay() {
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
  } else {
    audio.play().catch(() => {});
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸';
  }
}

function switchTrack(idx) {
  currentTrack = idx;
  loadTrack(idx);
  audio.play().catch(() => {});
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸';
  document.getElementById('specialDropdown').classList.remove('visible');
}

function toggleSpecialMenu() {
  const dropdown = document.getElementById('specialDropdown');
  dropdown.classList.toggle('visible');
  // position under Special menu item
  const special = document.getElementById('menuSpecial');
  const rect = special.getBoundingClientRect();
  dropdown.style.left = rect.left + 'px';
}

document.addEventListener('click', e => {
  if (!e.target.closest('#menuSpecial') && !e.target.closest('#specialDropdown')) {
    document.getElementById('specialDropdown').classList.remove('visible');
  }
});

audio.addEventListener('ended', () => {
  currentTrack = (currentTrack + 1) % PLAYLIST.length;
  loadTrack(currentTrack);
  audio.play().catch(() => {});
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadTrack(0);
drawCat('normal');

// 자동재생 (브라우저 정책상 사용자 첫 인터랙션 후 재생)
document.addEventListener('click', function startAudio() {
  if (!isPlaying) {
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸';
    }).catch(() => {});
  }
  document.removeEventListener('click', startAudio);
}, { once: true });
renderStep();
